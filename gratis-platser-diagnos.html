<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratis - platsantal diagnos</title>
<style>
  body { font-family:-apple-system,sans-serif; background:#10141a; color:#eef1f5; margin:0; padding:20px; }
  h1 { font-size:18px; }
  p { color:#8b97a5; font-size:13px; }
  #status { color:#f59e0b; margin-top:10px; }
  table { border-collapse:collapse; width:100%; margin-top:16px; font-size:13px; }
  th, td { text-align:left; padding:6px 10px; border-bottom:1px solid #2a3340; }
  th { color:#8b97a5; font-size:11px; text-transform:uppercase; }
  .yes { color:#22c55e; font-weight:700; }
  .no { color:#ef4444; font-weight:700; }
</style>
</head>
<body>

<h1>Diagnos: finns ParkingSpaces för gratisparkeringar?</h1>
<div id="status">Hämtar data...</div>
<table id="result-table" style="display:none;">
  <thead><tr><th>Fält</th><th>Resultat</th></tr></thead>
  <tbody id="result-body"></tbody>
</table>
<div id="samples"></div>

<script>
  const APPID = 'd5d377dd-ec35-4395-b965-e1da3920366b';
  const BASE = 'https://data.goteborg.se/ParkingService/v2.3/';

  function jsonp(url, callbackName) {
    return new Promise((resolve, reject) => {
      window[callbackName] = (data) => { resolve(data); delete window[callbackName]; script.remove(); };
      const script = document.createElement('script');
      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + callbackName;
      script.onerror = () => reject(new Error('Kunde inte hämta data'));
      document.body.appendChild(script);
    });
  }

  jsonp(BASE + `PublicTimeParkings/${APPID}?format=JSON`, 'handleTimeData')
    .then(data => {
      const list = data.PublicTimeParkings || data || [];
      const total = list.length;
      const withSpaces = list.filter(p => p.ParkingSpaces !== null && p.ParkingSpaces !== undefined && p.ParkingSpaces !== 0).length;
      const nullCount = list.filter(p => p.ParkingSpaces === null || p.ParkingSpaces === undefined).length;
      const zeroCount = list.filter(p => p.ParkingSpaces === 0).length;

      document.getElementById('status').textContent = `Klart. ${total} gratisposter hittade.`;
      document.getElementById('result-table').style.display = 'table';
      const tbody = document.getElementById('result-body');
      tbody.innerHTML = `
        <tr><td>Totalt antal poster</td><td>${total}</td></tr>
        <tr><td>Har ett verkligt ParkingSpaces-värde (>0)</td><td class="${withSpaces > 0 ? 'yes' : 'no'}">${withSpaces} st</td></tr>
        <tr><td>ParkingSpaces är null/saknas</td><td>${nullCount} st</td></tr>
        <tr><td>ParkingSpaces är exakt 0</td><td>${zeroCount} st</td></tr>
      `;

      // Visa några råa exempel så vi ser exakt hur fältet ser ut
      const sampleHtml = list.slice(0, 5).map(p =>
        `<div style="margin-top:8px; padding:8px; background:#1a2029; border-radius:8px; font-size:12px;">
          <b>${p.Name || '(okänt namn)'}</b><br>
          ParkingSpaces: <code>${JSON.stringify(p.ParkingSpaces)}</code><br>
          FreeSpaces: <code>${JSON.stringify(p.FreeSpaces)}</code>
        </div>`
      ).join('');
      document.getElementById('samples').innerHTML = '<h3 style="margin-top:20px;">5 exempelposter (rådata):</h3>' + sampleHtml;
    })
    .catch(err => {
      document.getElementById('status').textContent = 'Fel: ' + err.message;
    });
</script>

</body>
</html>
